<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERE-Sustenance Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --border-color: #d1d9e0;
            --table-header-bg: #e9eff5;
            --text-main: #333;
            --link-color: #0052cc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .page-header h1 {
            font-size: 20px;
            color: #172b4d;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .page-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .page-subtitle {
            margin: 0;
            font-size: 14px;
            color: #5e6c84;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-select-label {
            font-size: 12px;
            color: #444;
            font-weight: 600;
        }

        .month-select {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 12px;
            color: #172b4d;
            background: #fff;
        }

        .sub-heading {
            margin: 0 0 12px;
            font-size: 14px;
            color: #5e6c84;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .summary-table-wrap {
            margin-bottom: 20px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .summary-table th,
        .summary-table td {
            border-bottom: 1px solid #e4e8ee;
            padding: 10px 8px;
            vertical-align: top;
        }

        .summary-table th {
            background-color: var(--table-header-bg);
            color: #172b4d;
            text-align: left;
            white-space: nowrap;
        }

        .summary-table .metric-cell {
            font-weight: 700;
            color: #172b4d;
            min-width: 140px;
        }

        .summary-table .signal-cell {
            min-width: 260px;
            color: #444;
        }

        .indicator-status.good {
            color: #1e7e34;
            font-weight: 700;
        }

        .indicator-status.medium {
            color: #b36b00;
            font-weight: 700;
        }

        .indicator-status.high {
            color: #b71c1c;
            font-weight: 700;
        }

        .indicator-status.engaged {
            color: #0052cc;
            font-weight: 700;
        }

        .indicator-status.pending {
            color: #6b778c;
            font-weight: 700;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: #1f2d3d;
        }

        .metric-note {
            margin-top: 4px;
            color: #6b778c;
            font-size: 11px;
        }

        .section-label {
            margin: 18px 0 10px;
            font-size: 13px;
            color: #172b4d;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .back-btn {
            padding: 5px 14px;
            border-radius: 4px;
            border: 1px solid #0052cc;
            background: #fff;
            color: #0052cc;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #e8f0fe;
        }

        .dashboard-container {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background-color: var(--table-header-bg);
            color: #172b4d;
            text-align: left;
            min-width: 120px;
            padding: 10px 8px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
            color: var(--text-main);
        }

        tr:hover td {
            background-color: #f0f4ff;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <div class="page-title-wrap">
            <h1>ERE-Sustenance Data</h1>
            <p id="ticketStatsHeading" class="page-subtitle">ERE Ticket Stats - All Months</p>
        </div>
        <div class="header-controls">
            <label for="monthFilter" class="month-select-label">Select Month:</label>
            <select id="monthFilter" class="month-select">
                <option value="">All</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            <a href="/" class="back-btn"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>

    <div class="section-label">Demand and Throughput</div>
    <div class="summary-table-wrap dashboard-container">
        <table class="summary-table">
            <thead>
                <tr>
                    <th>Metric</th>
                    <th id="monthCol1">Feb</th>
                    <th id="monthCol2">March</th>
                    <th id="monthCol3">April</th>
                    <th>Signal</th>
                </tr>
            </thead>
            <tbody id="summaryTableBody"></tbody>
        </table>
    </div>

    <div class="section-label">Efficiency & Toil Reduction </div>
    <div class="summary-table-wrap dashboard-container">
        <table class="summary-table">
            <thead>
                <tr>
                    <th>Indicator</th>
                    <th>Value</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="indicatorTableBody"></tbody>
        </table>
    </div>

    <div class="section-label">Ticket Details</div>

    <div class="dashboard-container">
        <table id="sustenanceTable">
            <thead>
                <tr>
                    <th>Issue Key</th>
                    <th>Summary</th>
                    <th>Status</th>
                    <th>Issue Type</th>
                    <th>Created Date</th>
                    <th>Labels</th>
                </tr>
            </thead>
            <tbody id="sustenanceTableBody">
                <tr>
                    <td colspan="6" class="empty-state">Loading sustenance data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const monthNames = [
            'January', 'February', 'March', 'April', 'May', 'June',
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        let allSustenanceTickets = [];
        let allSreincTickets = [];
        const monthColumnIds = ['monthCol1', 'monthCol2', 'monthCol3'];
        const devTicketPrefixes = [
            'ORS-', 'CPSSRE-', 'MAPPINGENG-', 'SRMM-', 'DPEXREQ-',
            'EWDEVESC-', 'GDPM-', 'DXRE-', 'DBATTERY-', 'SECESC-'
        ];

        function parseDate(value) {
            if (!value) return null;
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? null : date;
        }

        function formatMonthLabel(monthIndex, yearNumber) {
            return `${monthNames[monthIndex]} ${String(yearNumber).slice(-2)}`;
        }

        function getSelectedMonthIndex() {
            const selected = document.getElementById('monthFilter').value;
            if (!selected) return null;
            return Number(selected) - 1;
        }

        function getLatestDateFromTickets(ticketList, fieldName = 'created') {
            return ticketList
                .map(ticket => parseDate(ticket[fieldName]))
                .filter(Boolean)
                .sort((a, b) => a - b)
                .pop() || null;
        }

        function getActiveMonthYear() {
            const selectedMonthIndex = getSelectedMonthIndex();
            if (selectedMonthIndex !== null) {
                const latestDate = getLatestDateFromTickets(allSustenanceTickets, 'created');
                const year = latestDate ? latestDate.getFullYear() : new Date().getFullYear();
                return { monthIndex: selectedMonthIndex, year };
            }

            const latestDate = getLatestDateFromTickets(allSustenanceTickets, 'created') || new Date();
            return { monthIndex: latestDate.getMonth(), year: latestDate.getFullYear() };
        }

        function getMonthYearLabel(monthIndex, year) {
            return `${monthNames[monthIndex]} '${String(year).slice(-2)}`;
        }

        function getIncidentStatusClass(count) {
            if (count === 0) return 'good';
            if (count >= 1 && count <= 3) return 'medium';
            return 'high';
        }

        function getIncidentStatusText(count) {
            if (count === 0) return 'Good';
            if (count >= 1 && count <= 3) return 'Medium';
            return 'High';
        }

        function hasDevLink(ticket) {
            if (!ticket.issue_links || !Array.isArray(ticket.issue_links)) return false;
            return ticket.issue_links.some(link => {
                const linkKey = (link.key || '').toUpperCase();
                return devTicketPrefixes.some(prefix => linkKey.startsWith(prefix));
            });
        }

        function calculateSelfResolutionRate(monthIndex, year, ticketList) {
            const resolvedTickets = ticketList.filter(ticket => {
                const createdDate = parseDate(ticket.created);
                if (!createdDate) return false;
                if (createdDate.getMonth() !== monthIndex || createdDate.getFullYear() !== year) return false;
                const status = (ticket.status || '').toLowerCase();
                return status === 'resolved' || status === 'closed' || !!ticket.resolution_date;
            });

            if (resolvedTickets.length === 0) return null;

            const withDevLinks = resolvedTickets.filter(ticket => hasDevLink(ticket)).length;
            const selfResolved = resolvedTickets.length - withDevLinks;
            const rate = (selfResolved / resolvedTickets.length) * 100;

            return {
                selfResolved,
                withDevLinks,
                totalResolved: resolvedTickets.length,
                rate: rate.toFixed(2)
            };
        }

        function getSelfResolutionStatusClass(rate) {
            if (rate === null) return 'pending';
            const numRate = parseFloat(rate);
            if (numRate === 0) return 'high';
            if (numRate > 0 && numRate < 50) return 'high';
            if (numRate >= 50 && numRate < 80) return 'medium';
            return 'good';
        }

        function getSelfResolutionStatusText(rate) {
            if (rate === null) return 'Pending input';
            const numRate = parseFloat(rate);
            if (numRate === 0) return 'Low';
            if (numRate > 0 && numRate < 50) return 'Low';
            if (numRate >= 50 && numRate < 80) return 'Medium';
            return 'High';
        }

        function addHoursToDate(dateString, hours) {
            const date = parseDate(dateString);
            if (!date) return dateString;
            date.setHours(date.getHours() + hours);
            return date.toISOString();
        }

        function formatDateOnly(dateString) {
            const date = parseDate(dateString);
            if (!date) return dateString;
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderIndicatorTable() {
            const { monthIndex, year } = getActiveMonthYear();
            const monthLabel = getMonthYearLabel(monthIndex, year);

            const selfResolutionData = calculateSelfResolutionRate(monthIndex, year, allSustenanceTickets);

            const incidentsDeliveryCount = allSustenanceTickets.filter(ticket => {
                const createdDate = parseDate(ticket.created);
                if (!createdDate) return false;
                const hasServiceIncident = ticket.service_incident !== null && ticket.service_incident !== undefined && String(ticket.service_incident).trim() !== '';
                return hasServiceIncident && createdDate.getMonth() === monthIndex && createdDate.getFullYear() === year;
            }).length;

            const pmrRepresentedCount = allSreincTickets.filter(ticket => {
                const createdDate = parseDate(ticket.created);
                if (!createdDate) return false;
                return createdDate.getMonth() === monthIndex && createdDate.getFullYear() === year;
            }).length;

            const incidentStatusClass = getIncidentStatusClass(incidentsDeliveryCount);
            const incidentStatusText = getIncidentStatusText(incidentsDeliveryCount);

            const selfResolutionValue = selfResolutionData ? `${selfResolutionData.rate}%` : '-';
            const selfResolutionNote = selfResolutionData ? `${selfResolutionData.selfResolved} / ${selfResolutionData.totalResolved}` : '';
            const selfResolutionStatusClass = getSelfResolutionStatusClass(selfResolutionData ? selfResolutionData.rate : null);
            const selfResolutionStatusText = getSelfResolutionStatusText(selfResolutionData ? selfResolutionData.rate : null);

            const rows = [
                {
                    indicator: `Self-Resolution Rate (${monthLabel})`,
                    value: selfResolutionValue,
                    note: selfResolutionNote,
                    statusText: selfResolutionStatusText,
                    statusClass: selfResolutionStatusClass
                },
                {
                    indicator: `Median Backlog (${monthLabel})`,
                    value: '<a href="https://track.akamai.com/jira/plugins/servlet/eazybi/accounts/246/cubes/Issues/reports/2822-trend-of-backlogs" target="_blank" rel="noopener noreferrer" style="font-size:12px;font-weight:600;">View Backlog Trend</a>',
                    note: '',
                    statusText: 'Reference',
                    statusClass: 'pending'
                },
                {
                    indicator: `Incidents Delivery (${monthLabel})`,
                    value: String(incidentsDeliveryCount),
                    note: '',
                    statusText: incidentStatusText,
                    statusClass: incidentStatusClass
                },
                {
                    indicator: `PMRs Represented in ${monthLabel}`,
                    value: String(pmrRepresentedCount),
                    note: '',
                    statusText: 'Engaged*',
                    statusClass: 'engaged'
                }
            ];

            const tbody = document.getElementById('indicatorTableBody');
            tbody.innerHTML = rows.map(row => `
                <tr>
                    <td class="metric-cell">${row.indicator}</td>
                    <td>
                        <div class="metric-value">${row.value}</div>
                        ${row.note ? `<div class="metric-note">${row.note}</div>` : ''}
                    </td>
                    <td class="indicator-status ${row.statusClass}">${row.statusText}</td>
                </tr>
            `).join('');
        }

        function getMonthWindow(ticketList) {
            const selectedMonthIndex = getSelectedMonthIndex();
            let yearNumber = new Date().getFullYear();

            const latestDate = ticketList
                .map(ticket => parseDate(ticket.created))
                .filter(Boolean)
                .sort((a, b) => a - b)
                .pop();

            if (latestDate) {
                yearNumber = latestDate.getFullYear();
            }

            if (selectedMonthIndex === null) {
                const months = [];
                for (let i = 2; i >= 0; i -= 1) {
                    months.push({ monthIndex: (latestDate ? latestDate.getMonth() : new Date().getMonth()) - i, year: yearNumber });
                }
                return months.map(item => {
                    let monthIndex = item.monthIndex;
                    let year = item.year;
                    while (monthIndex < 0) {
                        monthIndex += 12;
                        year -= 1;
                    }
                    return { monthIndex, year };
                });
            }

            const months = [];
            for (let i = 2; i >= 0; i -= 1) {
                let monthIndex = selectedMonthIndex - i;
                let year = yearNumber;
                while (monthIndex < 0) {
                    monthIndex += 12;
                    year -= 1;
                }
                months.push({ monthIndex, year });
            }
            return months;
        }

        function countByMonth(ticketList, monthIndex, year, fieldName, filterFn) {
            return ticketList.reduce((count, ticket) => {
                const date = parseDate(ticket[fieldName]);
                if (!date) return count;
                if (date.getFullYear() !== year || date.getMonth() !== monthIndex) return count;
                if (filterFn && !filterFn(ticket)) return count;
                return count + 1;
            }, 0);
        }

        function buildSignal(values, positiveLabel, negativeLabel) {
            if (values.length < 3) return 'Not enough data to determine a clear signal';
            const [first, second, third] = values;
            if (third < second && second <= first) return negativeLabel;
            if (third > second && second >= first) return positiveLabel;
            if (third === second && second === first) return 'Stable across the selected period';
            return 'Mixed movement across the selected period';
        }

        function renderSummaryTable(ticketList) {
            const months = getMonthWindow(ticketList);
            const headerLabels = months.map(item => formatMonthLabel(item.monthIndex, item.year));
            monthColumnIds.forEach((id, index) => {
                document.getElementById(id).textContent = headerLabels[index] || '';
            });

            const totalTickets = months.map(item => countByMonth(ticketList, item.monthIndex, item.year, 'created'));
            const ticketsResolved = months.map(item => countByMonth(ticketList, item.monthIndex, item.year, 'resolution_date', ticket => (ticket.status || '').toLowerCase() === 'resolved' || !!ticket.resolution_date));
            const highSeverity = months.map(item => countByMonth(ticketList, item.monthIndex, item.year, 'created', ticket => {
                const priority = (ticket.priority || '').toLowerCase();
                return priority === 'high' || priority === 'critical';
            }));

            const summaryRows = [
                {
                    metric: 'Total Tickets',
                    values: totalTickets,
                    signal: buildSignal(totalTickets, 'Overall ticket volume is improving month over month', 'Slight downward trend driven by seasonality and fewer incidents')
                },
                {
                    metric: 'Tickets Resolved',
                    values: ticketsResolved,
                    signal: buildSignal(ticketsResolved, 'Resolution throughput improved in the latest month', 'Resolution throughput softened in the latest month')
                },
                {
                    metric: 'High Severity',
                    values: highSeverity,
                    signal: buildSignal(highSeverity, 'High-severity incidents are trending down', 'Continued decline in critical incidents reported by Akatec')
                }
            ];

            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = summaryRows.map(row => `
                <tr>
                    <td class="metric-cell">${row.metric}</td>
                    <td>
                        <div class="metric-value">${row.values[0]}</div>
                    </td>
                    <td>
                        <div class="metric-value">${row.values[1]}</div>
                    </td>
                    <td>
                        <div class="metric-value">${row.values[2]}</div>
                    </td>
                    <td class="signal-cell">${row.signal}</td>
                </tr>
            `).join('');
        }

        function getDisplayYearSuffix(ticketList) {
            const latestDate = ticketList
                .map(t => parseDate(t.created))
                .filter(Boolean)
                .sort((a, b) => a - b)
                .pop();
            if (latestDate) {
                return String(latestDate.getFullYear()).slice(-2);
            }
            return String(new Date().getFullYear()).slice(-2);
        }

        function updateHeading(selectedMonth, ticketList) {
            const heading = document.getElementById('ticketStatsHeading');
            if (!selectedMonth) {
                heading.textContent = 'ERE Ticket Stats - All Months';
                return;
            }

            const monthLabel = monthNames[Number(selectedMonth) - 1] || '';
            const yearSuffix = getDisplayYearSuffix(ticketList);
            heading.textContent = `ERE Ticket Stats - ${monthLabel} ${yearSuffix}`;
        }

        function renderTableRows(ticketList) {
            const tbody = document.getElementById('sustenanceTableBody');

            if (ticketList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No sustenance tickets found for selected month.</td></tr>`;
                return;
            }

            tbody.innerHTML = ticketList.map(t => {
                const labels = (t.labels || []).map(l => `<span style="display:inline-block;background:#e9eff5;color:#0052cc;padding:2px 6px;margin:2px;border-radius:4px;font-size:10px;font-weight:bold;">${l}</span>`).join('');
                const issueUrl = `https://track.akamai.com/jira/browse/${t.ticket_id}`;
                return `<tr>
                    <td><a href="${issueUrl}" target="_blank">${t.ticket_id || ''}</a></td>
                    <td>${t.summary || ''}</td>
                    <td>${t.status || ''}</td>
                    <td>${t.issue_type || ''}</td>
                    <td>${formatDateOnly(t.created) || ''}</td>
                    <td>${labels}</td>
                </tr>`;
            }).join('');
        }

        function applyMonthFilter() {
            const selectedMonth = document.getElementById('monthFilter').value;
            let filteredTickets = allSustenanceTickets;

            if (selectedMonth) {
                filteredTickets = allSustenanceTickets.filter(t => {
                    const createdDate = parseDate(t.created);
                    if (!createdDate) return false;
                    return (createdDate.getMonth() + 1) === Number(selectedMonth);
                });
            }

            updateHeading(selectedMonth, allSustenanceTickets);
            renderSummaryTable(allSustenanceTickets);
            renderIndicatorTable();
            renderTableRows(filteredTickets);
        }

        async function loadData() {
            try {
                const [res, sreincRes] = await Promise.all([
                    fetch('/api/ere-sustenance-tickets'),
                    fetch('/api/ere-sustenance-tickets-sreinc')
                ]);

                if (!res.ok) throw new Error('Failed to fetch tickets');
                const tickets = await res.json();

                if (sreincRes.ok) {
                    allSreincTickets = await sreincRes.json();
                } else {
                    allSreincTickets = [];
                }

                const filteredTickets = tickets.filter(t => {
                    const requestType = (t.request_type || '').toLowerCase().trim();
                    if (!requestType) return false;
                    if (requestType.includes('ere-ghost')) return false;
                    if (requestType.includes('new feature')) return false;
                    if (requestType.includes('unknown')) return false;
                    return true;
                });

                if (!filteredTickets || filteredTickets.length === 0) {
                    allSustenanceTickets = [];
                    updateHeading('', []);
                    renderSummaryTable([]);
                    renderIndicatorTable();
                    renderTableRows([]);
                    return;
                }

                const ticketsWithAdjustedDates = filteredTickets.map(t => ({
                    ...t,
                    created: addHoursToDate(t.created, 12)
                }));

                allSustenanceTickets = ticketsWithAdjustedDates;
                applyMonthFilter();
            } catch (e) {
                document.getElementById('sustenanceTableBody').innerHTML =
                    `<tr><td colspan="6" class="empty-state">Error loading data: ${e.message}</td></tr>`;
            }
        }

        document.getElementById('monthFilter').addEventListener('change', applyMonthFilter);
        loadData();
    </script>
</body>
</html>
